*{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#fff;--bg2:#f5f6f7;--bg3:#eef0f2;--t1:#111;--t2:#555;--t3:#999;--border:rgba(0,0,0,0.09);--border-md:rgba(0,0,0,0.16);--blue:#185FA5;--blue-bg:#E6F1FB;--blue-t:#185FA5;--green:#1D9E75;--green-bg:#EAF3DE;--green-t:#3B6D11;--amber:#BA7517;--amber-bg:#FAEEDA;--amber-t:#854F0B;--red:#E24B4A;--red-bg:#FCEBEB;--red-t:#A32D2D;--purple:#534AB7;--purple-bg:#EEEDFE;--purple-t:#3C3489;--r:8px;--rl:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}

html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg3);color:var(--t1);display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg1);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;flex:1}
.topbar-sub{font-size:12px;color:var(--t3)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;font-size:13px;border:0.5px solid var(--border-md);border-radius:var(--r);cursor:pointer;background:var(--bg1);color:var(--t1);transition:all .12s;font-family:inherit;font-weight:500}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{filter:brightness(1.1)}
.btn-sm{padding:4px 10px;font-size:12px}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--bg1);border-bottom:0.5px solid var(--border);flex-wrap:wrap}
.filter-pill{padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .12s;user-select:none;opacity:.5;background:var(--bg2)}
.filter-pill.active{opacity:1;border-color:currentColor;background:transparent}
.search-box{padding:6px 12px;font-size:13px;border:0.5px solid var(--border-md);border-radius:var(--r);background:var(--bg2);color:var(--t1);outline:none;width:180px;font-family:inherit}
.search-box:focus{border-color:var(--blue);background:var(--bg1)}
.vt-bar{display:flex;gap:2px;background:var(--bg2);border-radius:var(--r);padding:2px;border:0.5px solid var(--border)}
.vt-btn{padding:4px 12px;font-size:12px;border-radius:6px;cursor:pointer;font-weight:600;color:var(--t2);border:none;background:transparent;font-family:inherit}
.vt-btn.active{background:var(--bg1);color:var(--t1);box-shadow:var(--shadow)}
.sp{flex:1}
.main-area{flex:1;overflow-y:auto;padding:14px 20px}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-1px}
.stat-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.van-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.van-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--rl);padding:12px;box-shadow:var(--shadow)}
.van-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.van-name{font-size:13px;font-weight:700}
.van-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.van-info{font-size:11px;color:var(--t2);line-height:1.5}
.sched-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg1);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow);border:0.5px solid var(--border)}
.sched-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--t3);background:var(--bg2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.sched-table td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.sched-table tr:last-child td{border-bottom:none}
.sched-table tbody tr:hover td{background:var(--bg2);cursor:pointer}
.date-hdr td{background:var(--bg2)!important;font-weight:700;font-size:12px;color:var(--t2);padding:6px 10px!important}
.sport-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap}
.sport-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.van-sel{padding:3px 6px;font-size:12px;border:0.5px solid var(--border-md);border-radius:var(--r);background:var(--bg2);color:var(--t1);font-family:inherit;cursor:pointer;max-width:90px}

.warn-chip{background:var(--amber-bg);color:var(--amber-t);font-size:10px;font-weight:700;padding:1px 5px;border-radius:5px;margin-left:4px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px}
.empty-state{text-align:center;padding:60px;color:var(--t3)}
.sport-info-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:14px}
.sport-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px;box-shadow:var(--shadow)}

.coverage-alert{background:var(--red-bg);border:1px solid var(--red-t);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--red-t);font-weight:600;margin-bottom:12px;display:none}

/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--bg1);border-radius:var(--rl);border:0.5px solid var(--border);padding:24px;width:500px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:mIn .15s ease}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-title{font-size:16px;font-weight:700;margin-bottom:4px}
.modal-meta{font-size:13px;color:var(--t2);margin-bottom:16px}
.info-box{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:16px;font-size:13px}
.ilbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:2px}
.ival{font-weight:500}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:0.5px solid var(--border)}
.flabel{font-size:12px;color:var(--t2);margin-bottom:4px;display:block;font-weight:600}.frow{margin-bottom:12px}
input,select,textarea{width:100%;padding:7px 10px;font-size:13px;border:0.5px solid var(--border-md);border-radius:var(--r);background:var(--bg2);color:var(--t1);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12);background:var(--bg1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.conflict-alert{background:var(--amber-bg);border:1px solid var(--amber-t);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--amber-t);font-weight:600;margin-bottom:12px;display:none}
.conflict-alert.show{display:block}

// Returns true if leave time string is before 2:30 PM
function leaveBeforeTwo30(leaveTime) {
  if (!leaveTime) return false;
  // parse formats like "11:00 AM", "1:30 PM", "12:30 PM"
  const t = leaveTime.trim().toUpperCase();
  const m = t.match(/^(\d+):(\d+)\s*(AM|PM)$/);
  if (!m) return false;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  const ap = m[3];
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  // 2:30 PM = 14:30
  return h < 14 || (h === 14 && min < 30);
}

// Returns true if ANY teacher-coach on this sport needs class coverage
function needsCoverage(sport, leaveTime) {
  const info = SPORT_INFO[sport];
  if (!info || !leaveTime) return false;
  if (!leaveBeforeTwo30(leaveTime)) return false;
  const coaches = [info.headCoach, ...(info.assistCoaches || [])];
  return coaches.some(c => c && c.isTeacher);
}

const SC={Scheduled:'#888',Confirmed:'#1D9E75','En Route':'#185FA5',Returned:'#3B6D11',Cancelled:'#E24B4A'};

function load(){
  const saved=localStorage.getItem('hp-athletics');
  if(!saved)return BASE.map(e=>({...e}));
  const ov=JSON.parse(saved);
  return BASE.map(e=>({...e,...(ov[e.id]||{})}));
}
function save(){
  const ov={};
  evts.forEach(e=>{ov[e.id]={van:e.van,driver:e.driver,athletes:e.athletes,supervisor:e.supervisor,leaveTime:e.leaveTime,returnTime:e.returnTime,address:e.address,status:e.status,notes:e.notes};});
  localStorage.setItem('hp-athletics',JSON.stringify(ov));
}

let evts=load();
let view='list',sportF='all',haF='all',q='',editId=null;

function conflicts(){
  const c=new Set();
  const map={};
  evts.forEach(e=>{if(!e.van)return;const k=e.van+'-'+e.date;if(!map[k])map[k]=[];map[k].push(e.id);});
  Object.values(map).forEach(ids=>{if(ids.length>1)ids.forEach(id=>c.add(id));});
  return c;
}

function filtered(){
  return evts.filter(e=>{
    if(sportF!=='all'&&e.sport!==sportF)return false;
    if(haF!=='all'&&e.homeAway!==haF)return false;
    if(q){const s=(e.visitor+e.host+e.venue+e.sport+e.driver+e.notes).toLowerCase();if(!s.includes(q))return false;}
    return true;
  });
}

function fmt(d){const x=new Date(d+'T12:00:00');return x.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function t2i(t){if(!t||!t.includes(':'))return'';try{const pm=t.toLowerCase().includes('pm'),am=t.toLowerCase().includes('am');let[h,m]=t.replace(/[apm ]/gi,'').split(':');h=parseInt(h);m=parseInt(m)||0;if(pm&&h!==12)h+=12;if(am&&h===12)h=0;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}catch(e){return'';}}
function i2t(v){if(!v)return'';const[h,m]=v.split(':');const hi=parseInt(h);const ap=hi>=12?'PM':'AM';const h12=hi>12?hi-12:hi===0?12:hi;return h12+':'+m+' '+ap;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// filters
function buildFilters(){
  const c=document.getElementById('sport-filters');
  const all=document.createElement('div');
  all.className='filter-pill active';all.style.color='var(--t1)';all.textContent='All';all.dataset.sport='all';
  all.onclick=()=>setSport(all);c.appendChild(all);
  SPORTS.forEach(s=>{const p=document.createElement('div');p.className='filter-pill';p.style.color=BASE.find(e=>e.sport===s).color;p.textContent=s.replace("Boy's","B's").replace("Girl's","G's").replace('Track & Field','T&F');p.dataset.sport=s;p.onclick=()=>setSport(p);c.appendChild(p);});
}
function setSport(el){document.querySelectorAll('#sport-filters .filter-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');sportF=el.dataset.sport;render();}
function setHA(el){document.querySelectorAll('.toolbar .filter-pill[data-ha]').forEach(p=>p.classList.remove('active'));el.classList.add('active');haF=el.dataset.ha;render();}
function setSearch(v){q=v.toLowerCase();render();}
function setView(v,btn){view=v;document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function renderStats(){
  const f=filtered(),c=conflicts();
  const away=f.filter(e=>e.homeAway==='Away').length;
  const assigned=f.filter(e=>e.van).length;
  const need=f.filter(e=>e.homeAway==='Away'&&!e.van).length;
  const conf=[...c].filter(id=>f.find(e=>e.id===id)).length;
  const done=f.filter(e=>e.status==='Confirmed'||e.status==='Returned').length;
  const coverageNeeded=f.filter(e=>needsCoverage(e.sport,e.leaveTime)).length;
  document.getElementById('stats-row').innerHTML=
    `<div class="stat-card"><div class="stat-val">${f.length}</div><div class="stat-lbl">Total Events</div></div>`+
    `<div class="stat-card"><div class="stat-val" style="color:var(--blue-t)">${away}</div><div class="stat-lbl">Away Games</div></div>`+
    `<div class="stat-card"><div class="stat-val" style="color:var(--green-t)">${assigned}</div><div class="stat-lbl">Vans Assigned</div></div>`+
    `<div class="stat-card"><div class="stat-val" style="color:var(--red-t)">${need}</div><div class="stat-lbl">Need Van</div></div>`+
    `<div class="stat-card"><div class="stat-val" style="color:${coverageNeeded>0?'var(--red-t)':'var(--green-t)'}">${coverageNeeded}</div><div class="stat-lbl">Class Sub Needed</div></div>`+
    `<div class="stat-card"><div class="stat-val" style="color:${conf>0?'var(--amber-t)':'var(--green-t)'}">${conf}</div><div class="stat-lbl">Van Conflicts</div></div>`+
    `<div class="stat-card"><div class="stat-val" style="color:var(--green-t)">${done}</div><div class="stat-lbl">Confirmed</div></div>`;
  // Update stats-row grid for 7 columns
  document.getElementById('stats-row').style.gridTemplateColumns='repeat(7,1fr)';
}

function renderVans(){
  const c=conflicts();
  let h='';
  for(let v=1;v<=5;v++){
    const a=evts.filter(e=>e.van==v);
    const hasC=a.some(e=>c.has(e.id));
    const next=a.filter(e=>!['Returned','Cancelled'].includes(e.status)).sort((a,b)=>a.date.localeCompare(b.date))[0];
    const col=v===1?'#185FA5':v===2?'#1D9E75':v===3?'#D85A30':v===4?'#534AB7':'#BA7517';
    h+=`<div class="van-card"><div class="van-hdr"><div class="van-name" style="color:${col}">🚐 Van ${v}</div><span class="van-badge" style="background:${hasC?'var(--amber-bg)':a.length?'var(--green-bg)':'var(--bg2)'};color:${hasC?'var(--amber-t)':a.length?'var(--green-t)':'var(--t3)'}">${hasC?'CONFLICT':a.length?'Active':'Open'}</span></div><div class="van-info">${a.length} trip${a.length!==1?'s':''} total<br>${next?'Next: '+next.sport.replace("Boy's","B's").replace("Girl's","G's").replace('Track & Field','T&F')+' '+next.date:'<span style="color:var(--green-t)">No upcoming trips</span>'}</div></div>`;

function renderCalendar(){
  const months=[{y:2026,m:1,l:'February 2026'},{y:2026,m:2,l:'March 2026'},{y:2026,m:3,l:'April 2026'}];
  let h='';
  months.forEach(({y,m,l})=>{
    h+=`<div class="month-label">${l}</div><div class="cal-hdr">`;
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>h+=`<div class="cal-dh">${d}</div>`);
    h+='</div><div class="cal-grid">';
    const first=new Date(y,m,1),startDay=first.getDay(),days=new Date(y,m+1,0).getDate();
    for(let i=0;i<startDay;i++)h+='<div class="cal-cell empty"></div>';
    for(let d=1;d<=days;d++){
      const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayEvts=filtered().filter(e=>e.date===iso);
      const isToday=iso===new Date().toISOString().slice(0,10);
      h+=`<div class="cal-cell${isToday?' today':''}"><div class="cal-num">${d}</div>`;
      dayEvts.forEach(e=>{
        const short=e.sport.replace("Boy's","B's").replace("Girl's","G's").replace('Track & Field','T&F').replace('Volleyball','VB').replace('Baseball','⚾').replace('Softball','🥎');
        h+=`<div class="cal-ev" style="background:${e.color}" onclick="openModal(${e.id})" title="${e.sport} vs ${e.homeAway==='Away'?e.host:e.visitor}">${short}${e.van?' 🚐'+e.van:''}</div>`;
      });
      h+='</div>';
    }
    h+='</div>';
  });
  document.getElementById('view-area').innerHTML=h;
}

function openModal(id){
  const e=evts.find(x=>x.id===id);if(!e)return;
  editId=id;
  const col=e.color;
  const opp=e.homeAway==='Away'?e.host:e.visitor;
  const info=SPORT_INFO[e.sport];
  document.getElementById('m-title').textContent=e.sport+' — '+opp;
  document.getElementById('m-meta').innerHTML=`<span style="color:${col};font-weight:700">${e.homeAway}</span> · ${e.date} at ${e.gameTime}${info?` · <span class="van-needed">🚐 ${info.vansNeeded} van${info.vansNeeded>1?'s':''} needed</span>`:''}`;

  // Info grid
  document.getElementById('m-info').innerHTML=`
    <div><div class="ilbl">Visitor</div><div class="ival">${e.visitor}</div></div>
    <div><div class="ilbl">Host</div><div class="ival">${e.host}</div></div>
    <div><div class="ilbl">Venue</div><div class="ival">${e.venue}</div></div>
    <div><div class="ilbl">Scheduled Leave</div><div class="ival" style="color:var(--amber-t);font-weight:700">${e.leaveTime||'—'}</div></div>
    <div><div class="ilbl">Game Time</div><div class="ival">${e.gameTime}</div></div>
    <div><div class="ilbl">Sub Coverage</div><div class="ival">${e.subCoverage||'—'}</div></div>`;

  // Coach info panel
  const coachBox=document.getElementById('m-coach-info');
  const coachDetail=document.getElementById('m-coach-detail');
  if(info){
    const coaches=[
      info.headCoach?{...info.headCoach,role:'Head Coach'}:null,
      ...(info.assistCoaches||[]).map(c=>({...c,role:'Asst Coach'}))
    ].filter(Boolean);
    coachDetail.innerHTML=coaches.map(c=>`<div class="coach-row">
      <span class="coach-label">${c.role==='Head Coach'?'HC':'Asst'}</span>
      <span class="coach-name">${c.name}</span>
      ${c.isTeacher?'<span class="teacher-badge">👩‍🏫 Teacher — may need class sub</span>':''}
    </div>`).join('');
    coachBox.style.display='';
  } else {
    coachBox.style.display='none';
  }

  // Class coverage alert
  const coverageAlert=document.getElementById('m-coverage');
  if(needsCoverage(e.sport,e.leaveTime)){
    const teacherCoaches=(info?[info.headCoach,...(info.assistCoaches||[])].filter(c=>c&&c.isTeacher):[]).map(c=>c.name).join(', ');
    coverageAlert.textContent='⚠ CLASS COVERAGE REQUIRED — Leave time ('+e.leaveTime+') is before 2:30 PM. '+teacherCoaches+' will need a substitute for their classes.';
    coverageAlert.classList.add('show');
  } else {
    coverageAlert.classList.remove('show');
  }

  document.getElementById('m-van').value=e.van||'';
  document.getElementById('m-driver').value=e.driver||'';
  document.getElementById('m-athletes').value=e.athletes||'';
  document.getElementById('m-sup').value=e.supervisor||info?.headCoach?.name||'';
  document.getElementById('m-leave').value=t2i(e.leaveTime);
  document.getElementById('m-return').value=t2i(e.returnTime);
  document.getElementById('m-address').value=e.address||'';
  document.getElementById('m-status').value=e.status||'Scheduled';
  document.getElementById('m-notes').value=e.notes||'';
  checkConflict();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editId=null;}

function checkConflict(){
  if(!editId)return;
  const van=document.getElementById('m-van').value;
  const e=evts.find(x=>x.id===editId);
  const alert=document.getElementById('m-conflict');
  if(van&&e){
    const same=evts.filter(x=>x.id!==editId&&x.van==van&&x.date===e.date);
    if(same.length){alert.textContent='⚠ Van '+van+' is already assigned to: '+same.map(x=>x.sport).join(', ')+' on '+e.date;alert.classList.add('show');}
    else alert.classList.remove('show');
  } else alert.classList.remove('show');
}

function saveModal(){
  const e=evts.find(x=>x.id===editId);if(!e)return;
  e.van=document.getElementById('m-van').value||null;
  e.driver=document.getElementById('m-driver').value;
  e.athletes=parseInt(document.getElementById('m-athletes').value)||0;
  e.supervisor=document.getElementById('m-sup').value;
  e.leaveTime=i2t(document.getElementById('m-leave').value)||e.leaveTime;
  e.returnTime=i2t(document.getElementById('m-return').value);
  e.address=document.getElementById('m-address').value;
  e.status=document.getElementById('m-status').value;
  e.notes=document.getElementById('m-notes').value;
  save();closeModal();toast('Saved ✓');render();
}

function qVan(id,val){const e=evts.find(x=>x.id===id);if(e){e.van=val||null;save();renderStats();renderVans();}}
function qDriver(id,val){const e=evts.find(x=>x.id===id);if(e){e.driver=val;save();}}

function exportCSV(){
  const rows=[['Sport','Date','Game Time','Home/Away','Visitor','Host','Venue','Leave Time','Return Time','Vans Needed','Head Coach','Coach Is Teacher','Asst Coach(s)','Class Coverage Needed','Van Assigned','Driver','Athletes','Sub Coverage','Status','Address','Notes']];
  filtered().sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    const info=SPORT_INFO[e.sport]||{};
    const hc=info.headCoach?info.headCoach.name:'';
    const hcTeacher=info.headCoach&&info.headCoach.isTeacher?'Yes':'No';
    const asst=(info.assistCoaches||[]).map(c=>c.name).join('; ');
    const coverage=needsCoverage(e.sport,e.leaveTime)?'YES - Sub Required':'No';
    rows.push([e.sport,e.date,e.gameTime,e.homeAway,e.visitor,e.host,e.venue,e.leaveTime,e.returnTime,info.vansNeeded||'',hc,hcTeacher,asst,coverage,e.van?'Van '+e.van:'',e.driver,e.athletes,e.subCoverage,e.status,e.address,e.notes]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+(c||'').toString().replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='athletics-transport.csv';a.click();toast('CSV exported ✓');
}

function renderSportInfoBar(){
  const bar = document.getElementById('sport-info-bar');
  if (!bar) return;
  const sportOrder = ['Baseball','Softball',"Tennis - Boy's","Tennis - Girl's",'Track & Field',"Volleyball - Boy's"];
  bar.innerHTML = sportOrder.map(sport => {
    const info = SPORT_INFO[sport];
    if (!info) return '';
    const col = BASE.find(e=>e.sport===sport)?.color || '#888';
    const coaches = [
      info.headCoach ? { ...info.headCoach, role: 'HC' } : null,
      ...(info.assistCoaches || []).map(c => ({ ...c, role: 'Asst' }))
    ].filter(Boolean);
    // Count events for this sport
    const sportEvts = filtered().filter(e => e.sport === sport);
    const awayEvts = sportEvts.filter(e => e.homeAway === 'Away');
    const coverageEvts = awayEvts.filter(e => needsCoverage(sport, e.leaveTime));
    return `<div class="sport-card">
      <div class="sport-card-hdr">
        <div class="sport-icon" style="background:${col}22">${info.icon}</div>
        <div style="flex:1">
          <div class="sport-title" style="color:${col}">${sport}</div>
          <div class="sport-subtitle">${sportEvts.length} events · ${awayEvts.length} away</div>
        </div>
        <span class="van-needed">🚐 ${info.vansNeeded} van${info.vansNeeded>1?'s':''}</span>
      </div>
      <div>
        ${coaches.map(c => `<div class="coach-row">
          <span class="coach-label">${c.role}</span>
          <span class="coach-name">${c.name}</span>
          ${c.isTeacher ? '<span class="teacher-badge">👩‍🏫 Teacher</span>' : ''}
        </div>`).join('')}
      </div>
      ${coverageEvts.length ? `<div class="coverage-row">⚠ ${coverageEvts.length} event${coverageEvts.length>1?'s':''} need class coverage (early departure)</div>` : ''}
    </div>`;
  }).join('');
}

function render(){renderStats();renderVans();renderSportInfoBar();if(view==='list')renderList();else if(view==='calendar')renderCalendar();else renderByVans();}

buildFilters();render();
</script>
</body>
</html>
